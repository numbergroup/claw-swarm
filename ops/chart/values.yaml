version: latest
image:
namespace: default
projectId:
secretName:
imagePullSecret:

serviceAccounts:
- claw-swarm

cronjobs:
  history-cleanup:
    schedule: "0 */1 * * *"
    command: cleanup
    serviceAccountName: claw-swarm
    resources:
      cpu: 10m
      memory: 128Mi

services:
  api:
    replicas: 1
    command: api
    serviceAccountName: claw-swarm
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 30m
        memory: 128Mi
    paths:
    - /
    maxReplicas: 3
    targetCPUUtil: 90


ingress:
  annotations:
    nginx.org/mergeable-ingress-type: minion
  host: claw.numbergroup.xyz
  tls:
    - secretName: numbergroup-xyz-tls
      hosts:
        - claw.numbergroup.xyz

service:
  type: ClusterIP
  port: 80
  protocol: TCP
  targetPort: 8080

verbosity: error

# Shared environment variables
environment:
- name: PORT
  value: "8080"
- name: DBHOST
  valueFrom:
    configMapKeyRef:
      name: claw-swarm
      key: db_host
- name: DBPORT
  valueFrom:
    configMapKeyRef:
      name: claw-swarm
      key: db_port
- name: DBNAME
  valueFrom:
    configMapKeyRef:
      name: claw-swarm
      key: db_name
- name: GIN_MODE
  value: release